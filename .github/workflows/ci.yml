name: CI
on:
  # Only run on PR or main branch.
  # Prevent duplicate actions to safe compute time.
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  schedule:
    # Run once a week to make sure the current latest version still works
    - cron: "0 0 * * 0"

permissions:
  contents: read
  pull-requests: read

env:
  DOCKER_BUILDKIT: 1

jobs:
  # Check commit messages for compliance with conventional commits.
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: wagoid/commitlint-github-action@v6

  # Matrix build for Netbox versions
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        netbox-version:
          - v4.0.11
          - v4.1.11
          - v4.2.9
          - v4.3.7
          - v4.4.10
          - v4.5.2
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Versions
        run: |
          echo "Running with Docker Version: $(docker version)"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v6
        id: cache
        with:
          path: ~/.virtualenvs
          key: poetry-$
          restore-keys: |
            poetry-$

      - name: Install Dependencies using Poetry
        run: poetry install
        if: steps.cache.outputs.cache-hit != 'true'

      - name: Run tests
        run: |
          poetry run invoke test
        env:
          NETBOX_VER: ${{ matrix.netbox-version }}
          DOCKER_FLAGS: "--cache-from=type=gha --cache-to=type=gha,mode=max"

  # Single aggregated status check for branch protection to require.
  #
  # Requiring the matrix jobs directly would mean editing branch protection
  # every time the Netbox version list changes, and a required check that no
  # longer exists blocks every PR forever. Requiring only this job keeps that
  # list free to change.
  #
  # `always()` is load-bearing: without it this job is skipped when anything it
  # needs fails, the check never reports, and PRs wait on it indefinitely.
  ci-ok:
    if: always()
    needs: [commitlint, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify that all jobs passed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "commitlint: ${{ needs.commitlint.result }}"
          echo "build:      ${{ needs.build.result }}"
          exit 1
      - name: All checks passed
        run: echo "commitlint and the full Netbox matrix are green."
